<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eSecurityIn - CyberSecurity Seminar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="matrix"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>
<div class="vignette"></div>

<div class="card">
  <div class="panel-head">
    <img src="logo.png" alt="eSecurityIn logo" class="panel-logo">
    <span class="panel-title">eSecurityIn</span>
  </div>
  <div class="card-body">
    <div class="eyebrow">Application Form</div>
    <h1>CyberSecurity Seminar</h1>
    <p class="sub">Enter details below to generate your certificate.</p>

    <form id="regForm" novalidate>
      <div class="field" data-field="name">
        <label for="name">Full name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Aditi Sharma">
        <div class="field-error">Enter your full name.</div>
      </div>

      <div class="field" data-field="dob">
        <label for="dob">Date of birth</label>
        <input type="date" id="dob" name="dob">
        <div class="field-error">Enter a valid date of birth.</div>
      </div>

      <div class="field" data-field="phone">
        <label for="phone">Phone number</label>
        <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
        <div class="field-error">Enter a valid phone number.</div>
      </div>

      <div class="field" data-field="email">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@domain.com">
        <div class="field-error">Enter a valid email address.</div>
      </div>

      <label class="consent">
        <input type="checkbox" id="consent">
        I consent to my details being recorded for the workshop.
      </label>

      <button type="submit" class="btn-primary" id="submitBtn">&gt; SUBMIT </button>
      <div id="formMsg"></div>
    </form>
    <!--<div class="footnote">SESSION SECURED · DATA SENT DIRECTLY TO GOOGLE SHEETS</div>-->
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
